<svg width="500" height="400" viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A84FF" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#1976D2" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0.4" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="500" height="400" fill="url(#heroGrad)" opacity="0.1" rx="20" />
  <g filter="url(#glow)">
    <ellipse cx="250" cy="150" rx="100" ry="60" fill="#0A84FF" opacity="0.7" />
    <rect x="200" y="130" width="200" height="40" rx="10" fill="white" opacity="0.9" />
    <circle cx="220" cy="150" r="8" fill="#1976D2" />
    <circle cx="280" cy="150" r="8" fill="#1976D2" />
    <circle cx="340" cy="150" r="8" fill="#1976D2" />
  </g>
  <g stroke="#64B5F6" stroke-width="2" opacity="0.6">
    <line x1="100" y1="200" x2="400" y2="200" />
    <line x1="100" y1="250" x2="400" y2="250" />
    <path d="M150 180 Q250 100 350 180" fill="none" />
    <path d="M150 280 Q250 360 350 280" fill="none" />
  </g>
  <g transform="translate(400, 300)">
    <rect x="0" y="0" width="60" height="60" rx="8" fill="#0A84FF" opacity="0.8" />
    <text x="10" y="35" font-family="monospace" font-size="24" fill="white" font-weight="bold">{}</text>
  </g>
  <circle cx="100" cy="350" r="20" fill="#1976D2" opacity="0.7"/>
</svg>